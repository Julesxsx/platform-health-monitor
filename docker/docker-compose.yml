version: "3.9"

services:

  monitor:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - db-data:/app/data
    restart: unless-stopped
    depends_on:
      - api-gateway
      - worker-service
      - flaky-queue

  api-gateway:
    build:
      context: ..
      dockerfile: docker/Dockerfile.testservice
    command: uvicorn test_services.api_gateway:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    restart: unless-stopped

  worker-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.testservice
    command: uvicorn test_services.worker_service:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
    restart: unless-stopped

  flaky-queue:
    build:
      context: ..
      dockerfile: docker/Dockerfile.testservice
    command: uvicorn test_services.flaky_service:app --host 0.0.0.0 --port 8003
    ports:
      - "8003:8003"
    restart: unless-stopped

volumes:
  db-data: